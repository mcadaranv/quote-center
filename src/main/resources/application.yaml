server:
  servlet:
    context-path: /battery-quote-center

spring:
  application:
    name: quoting

  web:
    resources:
      static-locations: classpath:/static/battery-quote-center/

  datasource:
    url: jdbc:h2:mem:quotingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

quoting:
  client:
    metals-pricing:
      base-url: http://localhost:8888

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

